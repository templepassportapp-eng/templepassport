name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: asia-south1-docker.pkg.dev
  IMAGE_NAME: backend

jobs:
  # ── Job 1: Backend tests ────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: templepassport_test
          POSTGRES_USER: templepassport
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/templepassport_test
          SPRING_DATASOURCE_USERNAME: templepassport
          SPRING_DATASOURCE_PASSWORD: testpass
          JWT_SECRET: test-secret-key-for-ci-must-be-32chars!
        run: ./mvnw test -B -q

  # ── Job 2: Build admin portal ───────────────────────────────────────────────
  build-admin:
    name: Build Admin Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build
        working-directory: admin
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin/dist/
          retention-days: 1

  # ── Job 3: Build image + deploy (main only) ─────────────────────────────────
  deploy:
    name: Deploy to GCE
    needs: [test-backend, build-admin]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Authenticate via OIDC — no JSON key needed
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # Build and push backend image
      - name: Build and push backend image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/temple-passport/${{ env.IMAGE_NAME }}
          TAG=${{ github.sha }}
          docker build \
            --platform linux/amd64 \
            --cache-from $IMAGE:latest \
            -t $IMAGE:$TAG \
            -t $IMAGE:latest \
            ./backend
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      # Download the admin portal build artifact from job 2
      - name: Download admin dist
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: admin-dist/

      # Copy infra files to the GCE VM
      - name: Copy infra files to GCE
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/nginx.conf,scripts/deploy.sh,scripts/create-admin.sh"
          target: /opt/temple-passport/

      # Copy homepage static files
      - name: Copy homepage to GCE
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          source: "homepage/"
          target: /opt/temple-passport/

      # Copy admin portal static files
      - name: Copy admin dist to GCE
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          source: "admin-dist/"
          target: /opt/temple-passport/

      # SSH into the VM and run the deploy script
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            chmod +x /opt/temple-passport/scripts/deploy.sh /opt/temple-passport/scripts/create-admin.sh
            /opt/temple-passport/scripts/deploy.sh ${{ env.IMAGE_TAG }}
