name: Promote Dev to Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote" to confirm deploying dev → prod'
        required: true

jobs:
  promote:
    name: Merge dev → main and deploy to prod
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'promote'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge dev into main
        run: |
          git checkout main
          git merge --no-ff origin/dev -m "chore: promote dev → prod [skip ci on dev]"
          git push origin main
