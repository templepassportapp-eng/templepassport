spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/templepassport}
    username: ${SPRING_DATASOURCE_USERNAME:templepassport}
    password: ${SPRING_DATASOURCE_PASSWORD:templepassport}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: dev-local-secret-key-for-local-dev-only!!

app:
  dev-mode: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
