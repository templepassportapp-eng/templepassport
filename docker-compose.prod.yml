services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: templepassport
      POSTGRES_USER: templepassport
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U templepassport -d templepassport"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed externally — backend connects via Docker network
    expose:
      - "5432"

  backend:
    image: asia-south1-docker.pkg.dev/${GCP_PROJECT_ID}/temple-passport/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - /opt/temple-passport/firebase-adminsdk.json:/opt/firebase-adminsdk.json:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/templepassport
      SPRING_DATASOURCE_USERNAME: templepassport
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-temple-passport-30183}
      GOOGLE_APPLICATION_CREDENTIALS: /opt/firebase-adminsdk.json
      JAVA_TOOL_OPTIONS: "-Xmx320m -Xms128m"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q 'UP' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - /opt/temple-passport/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/temple-passport/homepage:/usr/share/nginx/html/homepage:ro
      - /opt/temple-passport/admin-dist:/usr/share/nginx/html/admin:ro
      - /opt/temple-passport/certbot/conf:/etc/letsencrypt:ro
      - /opt/temple-passport/certbot/www:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3
