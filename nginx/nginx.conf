events {
  worker_connections 512;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # Gzip for all text-based responses
  gzip              on;
  gzip_comp_level   5;
  gzip_min_length   256;
  gzip_proxied      any;
  gzip_vary         on;
  gzip_types
    text/plain text/css text/javascript
    application/json application/javascript application/x-javascript
    application/xml image/svg+xml;

  # Rate limit zone — 30 req/min per IP for API endpoints
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

  # Log format
  log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # WebSocket upgrade map (used by API proxy)
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ── HTTP server ─────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (for SSL setup)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Security headers
    add_header X-Frame-Options       "DENY"                          always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-XSS-Protection      "1; mode=block"                 always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── API proxy ──────────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass         http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";

      proxy_connect_timeout 10s;
      proxy_read_timeout    60s;
      proxy_send_timeout    60s;

      # WebSocket support (for group chat in Phase 2)
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # ── Admin portal (React SPA) ───────────────────────────────────────────────
    location / {
      root  /usr/share/nginx/html;
      index index.html;

      # SPA routing — send all unknown paths to index.html
      try_files $uri $uri/ /index.html;

      # Cache static assets aggressively (Vite hashes filenames)
      location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
      }

      # Never cache the HTML entry point
      location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
      }
    }
  }
}
