events {
  worker_connections 256;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;
  keepalive_timeout 65;

  gzip             on;
  gzip_comp_level  5;
  gzip_min_length  256;
  gzip_proxied     any;
  gzip_vary        on;
  gzip_types
    text/plain text/css text/javascript
    application/json application/javascript application/x-javascript
    application/xml image/svg+xml;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

  log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ── HTTP — redirect to HTTPS + ACME challenge ────────────────────────────
  server {
    listen 80;
    server_name dev.templepassport.in;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name dev.templepassport.in;

    ssl_certificate     /etc/letsencrypt/live/dev.templepassport.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.templepassport.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Homepage
    location = / {
      root  /usr/share/nginx/html/homepage;
      try_files /index.html =404;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── API proxy ─────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=40 nodelay;

      proxy_pass         http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;

      proxy_connect_timeout 10s;
      proxy_read_timeout    60s;
      proxy_send_timeout    60s;
    }

    # ── Admin portal ──────────────────────────────────────────────────────
    location = /admin {
      return 301 /admin/;
    }

    location /admin/ {
      root  /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /admin/index.html;

      location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
      }

      location = /admin/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
      }
    }
  }
}
